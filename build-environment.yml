name: build-env
channels:
  - conda-forge
dependencies:
  - python
  - pip
  - jupyter_server
  - jupyterlite-core >=0.7,<0.8
  - jupyterlite-xeus >=4,<5
  # Slideshow / deck support: presents the notebook as a reveal-style deck
  # inside JupyterLite, with the xeus kernel staying live during the talk.
  - jupyterlab-deck >=0.2.0
